# Portable automation spec for the board triggered-agent.
#
# Canon for HOW the board agent is scheduled and dispatched. Host bindings Orca generates
# (workspace path, repo/automation UUIDs) are NOT here — deploy/provision.py resolves them on
# the host and applies this spec idempotently (match Orca automation by `name`, edit in place
# so the automation id — and thus the systemd unit — stays stable).

name = "board"            # Orca automation name; the match key across re-provisions
skill = "/board"          # automation prompt = skill invocation (skill lives in .claude/skills/board)
provider = "claude"
reuse_session = true
precheck = ""             # PoC: no change-detection yet; git-sha precheck lands when it earns its keep

[trigger]
# Orca's own rrule does not tick in headless `orca serve`; kept for correctness but the real
# clock is the systemd timer below.
orca = "hourly"

[systemd]
# The actual scheduler on this headless box. Unit name is derived as ta-<name>.
calendar = "hourly"
randomized_delay_sec = 120   # jitter so the board sweep never races the curator at exactly :00
