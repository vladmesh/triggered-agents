# Head registry — a worker/reviewer head is data here, not the hardcoded `claude` binary in
# worker.py. A resource is a shared account/limit a head draws from (probe is a health-check
# command for that resource, run on a TTL by pipeline/health.py — red lives on the resource, every
# profile drawing from it inherits that redness). A profile names its resource, an adapter (which
# render_<adapter> in heads.py turns role+prompt into a launch command), and an ordered fallback
# chain of other profile ids health.resolve_head walks at claim time when the preferred profile's
# resource is red (the data shape existed before the walk did, so this card is a pure consumer, no
# registry rework).
#
# Adding a head (Codex, another Hermes model, ...) is a new [profiles.<id>] entry here plus, only
# if its launch shape is genuinely new, one more render_<adapter> function in heads.py — the
# dispatcher and worker.py never change.

[resources.claude-sub]
# The shared Claude subscription every claude-* profile below draws from — one account, no
# per-profile credential. Probe: one real haiku token through the shared OAuth-authenticated
# `claude` CLI (health.probe_claude_sub) — red exactly during a subscription rate-limit or an API
# outage, free the rest of the time (once per health.PROBE_TTL_S, not per tick).
account = "claude-subscription"
probe = "python3 -m triggered_agents pipeline probe --resource claude-sub"

[resources.openrouter]
# Pay-per-token OpenRouter credit (key: project_inspect/.env open_router_key). Since 2026-07-04
# only the steward's last-resort hermes profile draws from it — product tasks are Claude-only, so
# this is spent when the whole claude-sub resource is red and the watcher still has to wake.
# Probe: one real 1-token chat completion against gemini-flash (health.probe_openrouter) — red on
# a missing key, a non-2xx response, or a timeout.
account = "openrouter-pooled-key"
probe = "python3 -m triggered_agents pipeline probe --resource openrouter"

[resources.openai-sub]
# The ChatGPT/OpenAI subscription codex draws from via its native `codex` CLI — one account, no
# per-profile credential, mirroring resources.claude-sub. Authed once with `codex login` (ChatGPT
# OAuth) into the pinned CODEX_HOME (heads.CODEX_HOME), which also holds the memory MCP server and
# the global AGENTS.md. Probe: one real `codex exec` token through that home (health.probe_openai_sub)
# — red exactly when the subscription is rate-limited or the CLI can't reach the API.
account = "openai-subscription"
probe = "python3 -m triggered_agents pipeline probe --resource openai-sub"

[profiles.codex]
# Native OpenAI Codex head (gpt-5.5), verified end to end 2026-07-08 (memory MCP + global AGENTS.md
# reach the head). Standalone (fallback = []): a card names head=codex explicitly to run on it; a
# red openai-sub then means claim-skip, same shape as claude-sonnet. Deliberately absent from the
# claude/steward fallback chains — product policy stays Claude-only.
resource = "openai-sub"
adapter = "codex"
model = "gpt-5.5"
fallback = []

[profiles.claude-sonnet]
# No fallback (2026-07-04, vladmesh): product tasks run on Claude only. Overnight 04.07 the
# gemini-flash fallback burned three worker attempts without ever reaching the report step, so a
# red claude-sub now means claim-skip — the card waits in Ready until the resource recovers
# (health.resolve_head returns None) instead of spending openrouter tokens on work that won't land.
resource = "claude-sub"
adapter = "claude"
model = "sonnet"
fallback = []

[profiles.claude-opus]
resource = "claude-sub"
adapter = "claude"
model = "opus"
fallback = []

[profiles.claude-fable]
# Fable head for the steward agent (triggered-agents-243 design grill, 2026-07-04). Fallback:
# claude-opus first (Fable itself leaving the subscription), then hermes on a non-Anthropic
# model (vladmesh, 2026-07-04) — the steward is the watcher of last resort and must wake even when
# the whole claude-sub resource is red; a few paid openrouter tokens are the accepted price.
resource = "claude-sub"
adapter = "claude"
model = "fable"
fallback = ["claude-opus", "hermes"]

[profiles.hermes]
# Last-resort head for the steward chain ONLY — deliberately absent from every product profile's
# fallback (2026-07-04, vladmesh). Model is gpt-5.5, not a flash-tier one (same date): overnight
# 04.07 gemini-flash finished worker turns declaring success without push/PR/report, so the one
# place hermes still runs gets a model smart enough to follow the protocol.
resource = "openrouter"
adapter = "hermes"
model = "openai/gpt-5.5"
provider = "openrouter"
fallback = []
