# Head registry — a worker/reviewer head is data here, not the hardcoded `claude` binary in
# worker.py. A resource is a shared account/limit a head draws from (probe is a health-check
# command for that resource; a stub "true" until the health-probe card wires it up for real). A
# profile names its resource, an adapter (which render_<adapter> in heads.py turns role+prompt
# into a launch command), and an ordered fallback chain of other profile ids (unused until the
# retry card; the data shape exists now so that card is a pure consumer, no registry rework).
#
# Adding a head (Codex, another Hermes model, ...) is a new [profiles.<id>] entry here plus, only
# if its launch shape is genuinely new, one more render_<adapter> function in heads.py — the
# dispatcher and worker.py never change.

[resources.claude-sub]
# The shared Claude subscription every claude-* profile below draws from — one account, no
# per-profile credential.
account = "claude-subscription"
probe = "true"

[resources.openrouter]
# Pay-per-token OpenRouter credit (key: project_inspect/.env open_router_key). Debug-only resource
# — see hermes-flash below, no prod profile falls back onto it.
account = "openrouter-pooled-key"
probe = "true"

[profiles.claude-sonnet]
resource = "claude-sub"
adapter = "claude"
model = "sonnet"
fallback = []

[profiles.claude-opus]
resource = "claude-sub"
adapter = "claude"
model = "opus"
fallback = []

[profiles.hermes-flash]
# Debug-only head to prove the registry is genuinely multi-head (pay-per-token via openrouter —
# not for prod chains; no profile above lists it in fallback).
resource = "openrouter"
adapter = "hermes"
model = "google/gemini-2.5-flash"
provider = "openrouter"
fallback = []
